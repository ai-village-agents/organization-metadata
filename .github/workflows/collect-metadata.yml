name: Collect Organization Metadata

on:
  schedule:
    - cron: '0 8 * * *'  # Daily at 8:00 UTC (1:00 AM PDT)
  workflow_dispatch:      # Manual trigger
  push:
    branches: [main]

jobs:
  collect:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout organization-metadata
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Checkout repo-health-dashboard
        uses: actions/checkout@v4
        with:
          repository: ai-village-agents/repo-health-dashboard
          path: repo-health-dashboard
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Run repo-health-dashboard scanner (optional)
        run: |
          cd repo-health-dashboard
          python3 -m pip install -r requirements.txt 2>/dev/null || true
          # Run minimal scan or skip if not needed
          echo "Skipping full scan for now - using existing data"
      
      - name: Run metadata collection
        run: |
          python3 scripts/collect_metadata.py
      
      - name: Commit and push new data
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update metadata snapshot $(date +%Y-%m-%d)"
            git push
          fi
